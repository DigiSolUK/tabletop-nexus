name: Desktop Release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing git tag to publish, for example v1.0.0
        required: true
        type: string
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-desktop:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.release_tag || github.ref }}
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npx tsc --noEmit
      - run: npm run test
      - run: npm run make
      - uses: actions/upload-artifact@v4
        with:
          name: tabletop-nexus-${{ matrix.os }}
          path: out/make

  publish-release:
    runs-on: ubuntu-latest
    needs: build-desktop
    env:
      RELEASE_TAG_NAME: ${{ github.event.inputs.release_tag || github.ref_name }}
      HAS_CLOUDFLARE: ${{ secrets.CLOUDFLARE_API_TOKEN != '' && secrets.CLOUDFLARE_ACCOUNT_ID != '' }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.release_tag || github.ref }}
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - uses: actions/download-artifact@v4
        with:
          path: release-artifacts
      - run: node scripts/collect-release-assets.mjs
        env:
          RELEASE_INPUT_DIR: release-artifacts
          RELEASE_OUTPUT_DIR: release-assets
      - run: node scripts/create-checksums.mjs
        env:
          RELEASE_ASSETS_DIR: release-assets
      - name: Create or update GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "${RELEASE_TAG_NAME}" >/dev/null 2>&1; then
            gh release upload "${RELEASE_TAG_NAME}" release-assets/* --clobber
          else
            extra_flags=()
            if [[ "${RELEASE_TAG_NAME}" == *-* ]]; then
              extra_flags+=(--prerelease)
            fi
            gh release create "${RELEASE_TAG_NAME}" release-assets/* --title "${RELEASE_TAG_NAME}" --notes "Automated TableTop Nexus release" "${extra_flags[@]}"
          fi
      - if: ${{ !contains(env.RELEASE_TAG_NAME, '-') }}
        run: npm run release:manifest
        env:
          RELEASE_TAG: ${{ env.RELEASE_TAG_NAME }}
          RELEASE_REPO_SLUG: DigiSolUK/tabletop-nexus
          RELEASE_ASSETS_DIR: release-assets
          PUBLIC_SITE_URL: https://tabletopnexus.app
          PUBLIC_GITHUB_REPO_URL: https://github.com/DigiSolUK/tabletop-nexus
          PUBLIC_GITHUB_ISSUES_URL: https://github.com/DigiSolUK/tabletop-nexus/issues
          PUBLIC_SUPPORT_EMAIL: support@tabletopnexus.app
      - if: ${{ !contains(env.RELEASE_TAG_NAME, '-') }}
        run: npm run release:validate-manifest
      - if: ${{ !contains(env.RELEASE_TAG_NAME, '-') }}
        run: npm --prefix site ci
      - if: ${{ !contains(env.RELEASE_TAG_NAME, '-') }}
        run: npm run site:build
        env:
          PUBLIC_SITE_URL: https://tabletopnexus.app
          PUBLIC_GITHUB_REPO_URL: https://github.com/DigiSolUK/tabletop-nexus
          PUBLIC_GITHUB_ISSUES_URL: https://github.com/DigiSolUK/tabletop-nexus/issues
          PUBLIC_SUPPORT_EMAIL: support@tabletopnexus.app
      - if: ${{ !contains(env.RELEASE_TAG_NAME, '-') && env.HAS_CLOUDFLARE != 'true' }}
        run: echo "Cloudflare secrets are not configured, so stable site deployment is being skipped."
      - if: ${{ !contains(env.RELEASE_TAG_NAME, '-') && env.HAS_CLOUDFLARE == 'true' }}
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy site/dist --project-name tabletop-nexus
