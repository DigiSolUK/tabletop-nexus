name: Deploy Site

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'site/**'
      - '.github/workflows/site.yml'

permissions:
  contents: read
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PUBLIC_SITE_URL: https://digisoluk.github.io/tabletop-nexus/
  PUBLIC_SITE_BASE: /tabletop-nexus/
  PUBLIC_GITHUB_REPO_URL: https://github.com/DigiSolUK/tabletop-nexus
  PUBLIC_GITHUB_ISSUES_URL: https://github.com/DigiSolUK/tabletop-nexus/issues
  PUBLIC_SUPPORT_EMAIL: support@tabletopnexus.app

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  deploy:
    if: ${{ github.event_name == 'workflow_dispatch' || github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm --prefix site ci
      - run: npm run site:build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site/dist
      - id: deployment
        uses: actions/deploy-pages@v4
